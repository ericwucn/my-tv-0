name: Android Emulator Test (GPU Accelerated)

on:
  workflow_dispatch:
  push:
    branches:
      - v1.0.0-epg7

permissions:
  contents: read
  actions: write

jobs:
  test-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read-write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download APK from Release
        run: |
          echo "Downloading APK..."
          curl -sL -o app-release.apk "https://github.com/ericwucn/my-tv-0/releases/download/v1.0.0-epg7/my-tv-0_v1.0.0-epg7_fixed.apk"
          ls -lh app-release.apk
          echo "APK_SIZE=$(stat -c%s app-release.apk)" >> $GITHUB_ENV
      
      - name: Download Test M3U
        run: |
          curl -sL -o test.m3u "https://kwrt100.diskstation.dynv6.net:5666/3.m3u"
          head -5 test.m3u
      
      - name: Enable KVM
        run: |
          echo 'kvm' | sudo tee /etc/modules-load.d/kvm.conf
          echo 'kvm_intel' | sudo tee /etc/modprobe.d/kvm.conf
          ls -la /dev/kvm
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Create AVD with TV profile
        run: |
          echo "Creating TV AVD..."
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
            --name tv_test \
            --package "system-images;android-34;google_apis;tv_x86_64" \
            --device "tv_1080p" \
            --force 2>/dev/null || true
          
          # Also try without device specification
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd \
            --name tv_test2 \
            --package "system-images;android-34;google_apis;x86_64" \
            --force 2>/dev/null || true
          
          ls -la $HOME/.android/avd/
      
      - name: Start Emulator with GPU acceleration
        uses: reactivecircus/android-emulator-runner@v2
        with:
          avd-name: tv_test2
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: Nexus 5X
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -accel on
          working-directory: ./android-emulator
          script: |
            echo "Emulator started"
            adb wait-for-device
            adb shell getprop ro.build.version.release
            adb devices
      
      - name: Verify Emulator
        run: |
          echo "Checking emulator..."
          adb devices
          adb shell getprop ro.product.model
          adb shell getprop ro.build.version.release
      
      - name: Install APK
        run: |
          echo "Installing APK..."
          adb install -r app-release.apk
          echo "Checking package..."
          adb shell pm list packages | grep mytv
      
      - name: Configure Test
        run: |
          echo "Pushing test M3U..."
          adb push test.m3u /sdcard/Download/
          adb shell ls -la /sdcard/Download/
      
      - name: Launch and Test App
        run: |
          echo "Launching app..."
          adb shell am start -n com.lizongying.mytv0/.MainActivity
          
          echo "Waiting for app to start..."
          sleep 15
          
          echo "Checking app status..."
          adb shell pidof com.lizongying.mytv0 || echo "App not running"
          
          echo "Window focus..."
          adb shell dumpsys window | grep mCurrentFocus || echo "No focus info"
      
      - name: Capture Test Results
        if: always()
        run: |
          echo "=== Capturing test results ==="
          
          # Get app logs
          adb logcat -d -t 500 > test-logs.txt
          grep -i "mytv\|lizongying\|EPG\|Channel\|Error\|FATAL" test-logs.txt > app-logs.txt || true
          cat app-logs.txt
          
          # Get memory info
          adb shell dumpsys meminfo com.lizongying.mytv0 > mem-info.txt 2>/dev/null || true
          
          # Check for ANR
          adb shell ls /data/anr/ > anr-list.txt 2>/dev/null || echo "No ANR" > anr-list.txt
          cat anr-list.txt
      
      - name: Take Screenshot
        if: always()
        run: |
          adb shell screencap -p /sdcard/screenshot.png
          adb pull /sdcard/screenshot.png screenshot.png 2>/dev/null || echo "Screenshot failed"
          ls -lh screenshot.png 2>/dev/null || true
      
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            app-release.apk
            test-logs.txt
            app-logs.txt
            mem-info.txt
            anr-list.txt
            screenshot.png
          retention-days: 30
      
      - name: Test Summary
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check app status
          PID=$(adb shell pidof com.lizongying.mytv0 2>/dev/null)
          if [ -n "$PID" ]; then
            echo "✅ **App Running** - PID: $PID" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **App Not Running**" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check for ANR
          if [ -s "anr-list.txt" ] && ! grep -q "No ANR" anr-list.txt; then
            echo "⚠️ **ANR Detected**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **No ANR**" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Show logs
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Recent Logs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 app-logs.txt 2>/dev/null >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APK Info" >> $GITHUB_STEP_SUMMARY
          echo "- Size: ${{ env.APK_SIZE }} bytes" >> $GITHUB_STEP_SUMMARY
          echo "- Downloaded from: v1.0.0-epg7 release" >> $GITHUB_STEP_SUMMARY
